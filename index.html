<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free, open-source email signature generator. Build a professional signature in your browser — no login, no tracking, no data stored." />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Email Signature Generator" />
    <meta property="og:description" content="Build a professional email signature in your browser — free, open source, no login, no tracking." />
    <meta property="og:url" content="https://gorvok.github.io/customE-signature/" />
    <meta property="og:image" content="https://gorvok.github.io/customE-signature/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Email Signature Generator" />
    <meta name="twitter:description" content="Build a professional email signature in your browser — free, open source, no login, no tracking." />
    <meta name="twitter:image" content="https://gorvok.github.io/customE-signature/og.png" />

    <title>Email Signature Generator</title>
    <script>
      // Apply the saved/preferred theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
